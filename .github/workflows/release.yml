name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        id: tag_check
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -match '^\d+\.\d+\.\d+$') {
            "valid=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "valid=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
          }

      - name: Install Rust
        if: steps.tag_check.outputs.valid == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install rust-gpu nightly toolchain (must match shaders/rust-toolchain.toml)
        if: steps.tag_check.outputs.valid == 'true'
        shell: pwsh
        run: |
          rustup toolchain install nightly-2025-10-28 --profile minimal --component rust-src --component rustc-dev --component llvm-tools

      - name: Cache Cargo
        if: steps.tag_check.outputs.valid == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Build
        if: steps.tag_check.outputs.valid == 'true'
        run: cargo build --release --locked

      - name: Install UPX
        if: steps.tag_check.outputs.valid == 'true'
        run: choco install upx -y

      - name: Install NuGet CLI
        if: steps.tag_check.outputs.valid == 'true'
        run: choco install nuget.commandline -y

      - name: Compress binary with UPX
        if: steps.tag_check.outputs.valid == 'true'
        run: upx --best --lzma target\release\aura.exe

      - name: Package artifacts
        if: steps.tag_check.outputs.valid == 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $exeName = "aura-${{ github.ref_name }}-windows.exe"
          Copy-Item target\release\aura.exe "dist\$exeName" -Force
          Compress-Archive -Path "dist\$exeName" -DestinationPath "dist\aura-${{ github.ref_name }}-windows.zip" -Force

      - name: Package Squirrel artifacts
        if: steps.tag_check.outputs.valid == 'true'
        shell: pwsh
        run: |
          .\scripts\windows\package-squirrel.ps1 -Version "${{ github.ref_name }}"

      - name: Upload release assets
        if: steps.tag_check.outputs.valid == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/aura-${{ github.ref_name }}-windows.exe
            dist/aura-${{ github.ref_name }}-windows.zip
            dist/squirrel/aura-${{ github.ref_name }}-windows-installer.exe
            dist/squirrel/aura-${{ github.ref_name }}-windows-installer.zip
            dist/squirrel/RELEASES
            dist/squirrel/*.nupkg
